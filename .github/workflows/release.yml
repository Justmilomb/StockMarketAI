name: Release

# Triggers:
#   * push of a vX.Y.Z tag (the canonical release path — created by
#     scripts/release.py or `git tag` + `git push --tags`)
#   * manual dispatch (admin can rebuild a tag without re-tagging)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build, e.g. v1.0.1'
        required: true
        type: string
      mandatory:
        description: 'Mark this release as mandatory in /api/version'
        required: false
        default: false
        type: boolean
      publish_to_server:
        description: 'POST the new release to /api/admin/releases (BLANK_ADMIN_KEY required)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write  # required to push the GitHub Release + asset

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      filesize: ${{ steps.hash.outputs.filesize }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Need the full history so version_info / changelog tooling
          # can resolve previous tags if a future enhancement wants
          # auto-generated release notes.
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: bash
        # workflow_dispatch lets the operator type a tag in the UI;
        # tag-push events bring it as github.ref_name. Either way we
        # normalise to a "v1.2.3" tag and a "1.2.3" semver string.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag must look like vX.Y.Z, got '$TAG'"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-desktop.txt

      - name: Install Python dependencies
        run: pip install -r requirements-desktop.txt

      - name: Install Inno Setup
        # Choco's innosetup package mirrors the same ISCC.exe path
        # build.bat looks for ("C:\Program Files (x86)\Inno Setup 6\ISCC.exe"),
        # so we don't need to override anything in build.bat.
        run: choco install innosetup --no-progress -y

      - name: Run build.bat
        shell: cmd
        env:
          # Use the cached venv if present; build.bat tolerates a
          # missing .venv by skipping the activate step (the runner's
          # system Python already has the deps installed).
          SKIP_MODEL_DOWNLOAD: '${{ vars.SKIP_MODEL_DOWNLOAD }}'
          HF_TOKEN_READ: '${{ secrets.HF_TOKEN_READ }}'
          BLANK_CERT_PATH: '${{ secrets.BLANK_CERT_PATH }}'
          BLANK_CERT_PASS: '${{ secrets.BLANK_CERT_PASS }}'
        run: |
          REM build.bat hard-codes ".venv\Scripts\activate.bat" — when
          REM the runner doesn't have one we make a stub so the call
          REM resolves and immediately returns. Pip already installed
          REM every dep into the system interpreter above.
          if not exist .venv\Scripts\activate.bat (
            mkdir .venv\Scripts
            echo @echo off> .venv\Scripts\activate.bat
            echo exit /b 0>> .venv\Scripts\activate.bat
          )
          call build.bat

      - name: Verify installer exists
        shell: bash
        run: |
          if [ ! -f dist/blank-setup.exe ]; then
            echo "::error::dist/blank-setup.exe was not produced by build.bat"
            ls -la dist || true
            exit 1
          fi

      - name: Compute SHA256 + size
        id: hash
        shell: bash
        run: |
          SHA=$(sha256sum dist/blank-setup.exe | awk '{print $1}')
          SIZE=$(stat -c %s dist/blank-setup.exe 2>/dev/null || stat -f %z dist/blank-setup.exe)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "filesize=$SIZE" >> "$GITHUB_OUTPUT"
          echo "Built blank-setup.exe ($SIZE bytes, sha256=$SHA)"

      - name: Upload installer artefact
        uses: actions/upload-artifact@v4
        with:
          name: blank-setup
          path: dist/blank-setup.exe
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build-windows
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download installer artefact
        uses: actions/download-artifact@v4
        with:
          name: blank-setup
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-windows.outputs.tag }}
          VERSION: ${{ needs.build-windows.outputs.version }}
          SHA256: ${{ needs.build-windows.outputs.sha256 }}
        # gh release upload --clobber overwrites the asset if the
        # release already exists, so re-running on the same tag (e.g.
        # workflow_dispatch after a fix) just refreshes the binary
        # rather than failing.
        run: |
          set -euo pipefail
          NOTES="blank ${TAG}

          SHA256: ${SHA256}

          See https://github.com/${{ github.repository }}/commits/${TAG} for the change list."

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating asset."
            gh release upload "$TAG" dist/blank-setup.exe \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$TAG" dist/blank-setup.exe \
              --repo "${{ github.repository }}" \
              --title "blank ${TAG}" \
              --notes "$NOTES" \
              --latest
          fi

      - name: Publish release row to /api/admin/releases
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_to_server == 'true' }}
        env:
          BLANK_ADMIN_KEY: ${{ secrets.BLANK_ADMIN_KEY }}
          BLANK_API_BASE: ${{ vars.BLANK_API_BASE }}
          TAG: ${{ needs.build-windows.outputs.tag }}
          VERSION: ${{ needs.build-windows.outputs.version }}
          SHA256: ${{ needs.build-windows.outputs.sha256 }}
          MANDATORY: ${{ github.event.inputs.mandatory }}
        # POSTing to /api/admin/releases makes the new build visible
        # to every running desktop client through /api/version (and
        # therefore to the user dashboard's "download" link) within
        # the next heartbeat. Skipped silently when BLANK_ADMIN_KEY
        # isn't configured so a fork can still cut a release without
        # owning the production server.
        run: |
          set -euo pipefail
          BASE="${BLANK_API_BASE:-https://blan-api.onrender.com}"
          if [ -z "${BLANK_ADMIN_KEY:-}" ]; then
            echo "BLANK_ADMIN_KEY secret not set — skipping /api/admin/releases POST."
            echo "GitHub Release exists; the server's /api/version will fall back to /releases/latest until an admin manually publishes."
            exit 0
          fi
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/blank-setup.exe"
          MAND="${MANDATORY:-false}"
          [ "$MAND" = "true" ] || MAND=false
          BODY=$(jq -nc \
            --arg version "$VERSION" \
            --arg download_url "$DOWNLOAD_URL" \
            --arg sha256 "$SHA256" \
            --arg notes "blank ${TAG}" \
            --argjson mandatory "$MAND" \
            '{version:$version, download_url:$download_url, sha256:$sha256, notes:$notes, mandatory:$mandatory}')
          echo "POST $BASE/api/admin/releases  body=$BODY"
          curl -fsSL \
            -X POST "$BASE/api/admin/releases" \
            -H "x-admin-key: $BLANK_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          echo
          echo "Server now points /api/version download_url at $DOWNLOAD_URL"
