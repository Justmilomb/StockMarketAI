name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-desktop.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          # Prevent any accidental live broker calls in CI
          T212_API_KEY: ""
          T212_SECRET_KEY: ""
