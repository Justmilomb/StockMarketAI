<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blank — ai trading terminal</title>
    <meta name="description" content="blank is an autonomous ai trading terminal for windows by certified random.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-mid: rgba(255, 255, 255, 0.5);
            --text-dim: rgba(255, 255, 255, 0.2);
            --glow: #00ff87;
            --glow-dim: rgba(0, 255, 135, 0.06);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* animated grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            20% { transform: translate(-15%, 5%); }
            30% { transform: translate(7%, -15%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-15%, 10%); }
            60% { transform: translate(15%, 0%); }
            70% { transform: translate(0%, 10%); }
            80% { transform: translate(3%, -15%); }
            90% { transform: translate(-10%, 10%); }
        }

        /* cursor-follow spotlight */
        .spotlight {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(
                600px circle at var(--mx, 50%) var(--my, 50%),
                rgba(255, 255, 255, 0.03),
                transparent 70%
            );
            transition: opacity 0.4s ease;
        }

        /* main content */
        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 0;
        }

        /* staggered letter reveal */
        .title {
            font-weight: 700;
            font-size: clamp(5rem, 14vw, 12rem);
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .title span {
            display: inline-block;
            opacity: 0;
            transform: translateY(100%);
            animation: letterIn 0.8s var(--ease-out) forwards;
        }

        .title span:nth-child(1) { animation-delay: 0.1s; }
        .title span:nth-child(2) { animation-delay: 0.16s; }
        .title span:nth-child(3) { animation-delay: 0.22s; }
        .title span:nth-child(4) { animation-delay: 0.28s; }
        .title span:nth-child(5) { animation-delay: 0.34s; }

        @keyframes letterIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* description block */
        .desc {
            opacity: 0;
            animation: fadeUp 1s var(--ease-out) 0.5s forwards;
            margin-bottom: 3rem;
        }

        .tagline {
            font-size: clamp(0.875rem, 1.5vw, 1.0625rem);
            font-weight: 300;
            color: var(--text-mid);
            letter-spacing: 0.02em;
            line-height: 1.7;
        }

        /* download link */
        .download-wrap {
            opacity: 0;
            animation: fadeUp 1s var(--ease-out) 0.7s forwards;
        }

        .download {
            position: relative;
            display: inline-block;
            font-family: 'Outfit', sans-serif;
            font-size: 0.875rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: var(--glow);
            text-decoration: none;
            padding: 0.875rem 2.5rem;
            border: 1px solid rgba(0, 255, 135, 0.25);
            border-radius: 2px;
            transition: all 0.4s var(--ease-out);
            overflow: hidden;
        }

        .download::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--glow);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s var(--ease-out);
            z-index: -1;
        }

        .download:hover {
            color: #000000;
            border-color: var(--glow);
        }

        .download:hover::before {
            transform: scaleX(1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* scroll hint at the bottom of the hero */
        .scroll-hint {
            margin-top: auto;
            padding-bottom: 2.25rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.625rem;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 0.2em;
            text-decoration: none;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s var(--ease-out) 1.1s forwards;
            transition: color 0.4s var(--ease-out);
        }

        .scroll-hint:hover {
            color: var(--glow);
        }

        .scroll-hint .arrow {
            display: block;
            width: 1px;
            height: 1.75rem;
            background: currentColor;
            transform-origin: top;
            animation: scrollPulse 2.2s var(--ease-out) infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { transform: scaleY(0.3); opacity: 0.25; }
            50%      { transform: scaleY(1);   opacity: 1; }
        }

        /* changelog */
        .changelog {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 6rem 2rem 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .changelog-inner {
            width: 100%;
            max-width: 42rem;
        }

        .changelog-title {
            font-size: 0.6875rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 4rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .releases {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 3.5rem;
        }

        .release {
            opacity: 0;
            transform: translateY(20px);
            transition:
                opacity 0.8s var(--ease-out),
                transform 0.8s var(--ease-out);
        }

        .release.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .release-head {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.375rem;
        }

        .release .version {
            font-size: 1.0625rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        .release.latest .version {
            color: var(--glow);
        }

        .release .date {
            font-size: 0.625rem;
            font-weight: 300;
            letter-spacing: 0.14em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .release-notes {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
        }

        .release-notes li {
            position: relative;
            padding-left: 1.25rem;
            font-size: 0.875rem;
            font-weight: 300;
            line-height: 1.7;
            color: var(--text-mid);
        }

        .release-notes li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.8em;
            width: 0.4375rem;
            height: 1px;
            background: var(--text-dim);
        }

        /* footer */
        footer {
            position: relative;
            z-index: 10;
            padding: 2.5rem 2rem;
            text-align: center;
            opacity: 0;
            animation: fadeUp 1s var(--ease-out) 0.9s forwards;
        }

        .credit {
            font-size: 0.6875rem;
            font-weight: 300;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }

        /* reduced motion */
        @media (prefers-reduced-motion: reduce) {
            body::before { animation: none; }
            .title span { opacity: 1; transform: none; animation: none; }
            .desc, .download-wrap, .scroll-hint, footer { opacity: 1; animation: none; }
            .scroll-hint .arrow { animation: none; }
            .release { opacity: 1; transform: none; transition: none; }
        }

        @media (max-width: 480px) {
            .desc { margin-bottom: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="spotlight" aria-hidden="true"></div>

    <main>
        <h1 class="title"><span>b</span><span>l</span><span>a</span><span>n</span><span>k</span></h1>

        <div class="desc">
            <p class="tagline">autonomous ai trading terminal for windows</p>
        </div>

        <div class="download-wrap">
            <a id="download-btn" href="https://github.com/Justmilomb/StockMarketAI/releases/latest/download/BlankSetup.exe" class="download">download</a>
        </div>

        <a class="scroll-hint" href="#changelog" aria-label="scroll for update log">
            <span>update log</span>
            <span class="arrow" aria-hidden="true"></span>
        </a>
    </main>

    <section id="changelog" class="changelog">
      <div class="changelog-inner">
        <h2 class="changelog-title">update log</h2>
        <ol class="releases">
            <!-- RELEASES:START -->
            <li class="release latest">
                <div class="release-head">
                    <span class="version">loading…</span>
                </div>
                <ul class="release-notes">
                    <li>update log unavailable — the database may be warming up</li>
                </ul>
            </li>
            <!-- RELEASES:END -->
        </ol>
      </div>
    </section>

    <footer>
        <p class="credit">certified random</p>
    </footer>

    <script>
        // cursor-follow spotlight
        const spot = document.querySelector('.spotlight');
        let mx = 0.5, my = 0.5, cx = 0.5, cy = 0.5;

        document.addEventListener('mousemove', (e) => {
            mx = e.clientX / window.innerWidth;
            my = e.clientY / window.innerHeight;
        });

        (function tick() {
            cx += (mx - cx) * 0.08;
            cy += (my - cy) * 0.08;
            spot.style.setProperty('--mx', (cx * 100) + '%');
            spot.style.setProperty('--my', (cy * 100) + '%');
            requestAnimationFrame(tick);
        })();

        // download tracking — fires POST /api/download then follows the link
        document.getElementById('download-btn').addEventListener('click', function(e) {
            var href = this.getAttribute('href');
            if (href === '#download') return; // no real URL set yet
            e.preventDefault();
            fetch(window.location.origin + '/api/download', { method: 'POST' })
                .finally(function() { window.location.href = href; });
        });

        // reveal each release card on scroll
        (function revealReleases() {
            var releases = document.querySelectorAll('.release');
            if (!('IntersectionObserver' in window)) {
                releases.forEach(function (r) { r.classList.add('visible'); });
                return;
            }
            var io = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        io.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            releases.forEach(function (r) { io.observe(r); });
        })();
    </script>
</body>
</html>
